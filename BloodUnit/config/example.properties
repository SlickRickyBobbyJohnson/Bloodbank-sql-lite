# Copy this file to db-config.properties and edit values for your machine.
# No DB paths, table names, or column names are hardcoded in the app.

# Absolute or relative path to SQLite file.
# Use forward slashes (or escape backslashes) to avoid unicode escape parsing errors.
db.path=data/bloodbank.db

# Table and column names (must be valid SQL identifiers)
db.table=blood_units
col.unit_id=unit_id
col.blood_type=blood_type
col.donation_date=donation_date
col.expiry_date=expiry_date
col.donor_id=donor_id
col.status=status

